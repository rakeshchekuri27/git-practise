<!DOCTYPE html>
<html>
<head>
  <title>Main Section Example</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    main {
      padding: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Website</h1>
  </header>

  <main>
    <h2>Welcome</h2>
    <p>This is the main content of the webpage.</p>

    <section>
      <h3>About</h3>
      <p>This section contains information about the site.</p>
    </section>

    <section>
      <h3>Services</h3>
      <p>Details about services go here.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 Your Name</p>
  </footer>

</body>
</html>
